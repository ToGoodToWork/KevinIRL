# KevinStream - Stream Configuration
# Edit these values to match your setup

# Video device
VIDEO_DEVICE=/dev/video0
VIDEO_INPUT_FORMAT=mjpeg

# Resolution & framerate
WIDTH=1280
HEIGHT=720
FPS=30

# Encoding (h264_v4l2m2m = Pi 4 hardware encoder)
ENCODER=h264_v4l2m2m
BITRATE=2500k
GOP_SIZE=60
PIX_FMT=yuv420p

# V4L2 buffer settings (keep low for 1GB RAM)
NUM_OUTPUT_BUFFERS=16
NUM_CAPTURE_BUFFERS=8

# Protocol: "srt" or "rtmp"
PROTOCOL=rtmp

# ── RTMP settings ──
RTMP_URL=rtmp://100.83.125.4/live/stream

# ── SRT settings (used when PROTOCOL=srt) ──
SRT_HOST=100.83.125.4
SRT_PORT=9000
SRT_MODE=caller
SRT_LATENCY=800000
SRT_PASSPHRASE=kevinpc

# Audio (set to "none" to disable)
AUDIO_DEVICE=none
AUDIO_BITRATE=96k
