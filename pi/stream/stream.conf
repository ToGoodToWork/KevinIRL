# KevinStream - Stream Configuration
# Edit these values to match your setup

# Video device
VIDEO_DEVICE=/dev/video0
VIDEO_INPUT_FORMAT=mjpeg

# Resolution & framerate
WIDTH=1280
HEIGHT=720
FPS=30

# Encoding
# h264_v4l2m2m = Pi hardware encoder (fast, but incompatible with some RTMP servers)
# libx264 = software encoder (compatible with everything, uses more CPU)
ENCODER=libx264
BITRATE=2500k
GOP_SIZE=60
PIX_FMT=yuv420p

# Rate control - keeps bitrate stable on variable scenes
# MAXRATE caps spikes (recommended: 1.2x BITRATE), BUFSIZE smooths fluctuations (recommended: 2x BITRATE)
MAXRATE=3000k
BUFSIZE=5000k

# libx264 settings (only used when ENCODER=libx264)
X264_PRESET=ultrafast
X264_TUNE=zerolatency

# V4L2 buffer settings (only used when ENCODER=h264_v4l2m2m)
NUM_OUTPUT_BUFFERS=16
NUM_CAPTURE_BUFFERS=8

# Protocol: "srt" or "rtmp"
PROTOCOL=srt

# ── RTMP settings ──
RTMP_URL=rtmp://100.83.125.4/live/stream

# ── SRT settings (used when PROTOCOL=srt) ──
SRT_HOST=100.83.125.4
SRT_PORT=9000
SRT_MODE=caller
SRT_LATENCY=800000
SRT_PASSPHRASE=

# SRT tuning for mobile/lossy connections
# Overhead bandwidth % (extra bandwidth SRT uses for retransmission, default 25)
SRT_OHEADBW=25
# Send/receive buffer size in bytes (default 1500000 = ~1.5MB)
SRT_SNDBUF=1500000
SRT_RCVBUF=1500000

# Audio (set to "none" to disable)
AUDIO_DEVICE=none
AUDIO_BITRATE=96k
